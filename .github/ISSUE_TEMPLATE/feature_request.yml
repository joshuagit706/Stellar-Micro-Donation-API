name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you have considered.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Donations
        - Wallets
        - Recurring Donations
        - Statistics
        - Authentication / API Keys
        - Stellar Integration
        - Documentation
        - Testing
        - Other
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Low
        - Medium
        - High
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Links, mockups, or related issues.
